name: Build Vaultflix TWA APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Generate Signing Key
        run: |
          keytool -genkeypair \
            -alias vaultflix \
            -keyalg RSA \
            -keysize 2048 \
            -validity 9125 \
            -keystore vaultflix.keystore \
            -storepass vaultflix123 \
            -keypass vaultflix123 \
            -dname "CN=Vaultflix, OU=App, O=Vaultflix, L=IN, ST=IN, C=IN" \
            -noprompt

      - name: Create TWA Android Project
        run: |
          mkdir -p twa-app/app/src/main/res/values
          mkdir -p twa-app/app/src/main/res/xml
          mkdir -p twa-app/app/src/main/java/app/vaultflix/twa
          mkdir -p twa-app/app/src/main/assets

          # settings.gradle
          cat > twa-app/settings.gradle << 'GRADLE'
          include ':app'
          GRADLE

          # Root build.gradle
          cat > twa-app/build.gradle << 'GRADLE'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          GRADLE

          # gradle wrapper properties
          mkdir -p twa-app/gradle/wrapper
          cat > twa-app/gradle/wrapper/gradle-wrapper.properties << 'PROPS'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          PROPS

          # Install gradle wrapper
          cd twa-app
          gradle wrapper --gradle-version 8.2 || true
          cd ..

          # app/build.gradle
          cat > twa-app/app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
          }
          android {
              compileSdk 34
              namespace 'app.vaultflix.twa'
              defaultConfig {
                  applicationId 'app.vaultflix.twa'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0.0'
              }
              signingConfigs {
                  release {
                      storeFile file('../../vaultflix.keystore')
                      storePassword 'vaultflix123'
                      keyAlias 'vaultflix'
                      keyPassword 'vaultflix123'
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          GRADLE

          # AndroidManifest.xml
          cat > twa-app/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="Vaultflix"
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@style/AppTheme"
                  android:allowBackup="true">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:label="Vaultflix"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://vaultflix.netlify.app/" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:resource="@color/colorPrimary" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                          android:resource="@color/colorPrimary" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_IMAGE_DRAWABLE"
                          android:resource="@drawable/splash" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                          android:resource="@color/backgroundColor" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_FADE_OUT_DURATION"
                          android:value="300" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.FILE_PROVIDER_AUTHORITY"
                          android:value="app.vaultflix.twa.fileprovider" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https" android:host="vaultflix.netlify.app"/>
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="app.vaultflix.twa.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/filepaths" />
                  </provider>
              </application>
          </manifest>
          XML

          # Colors
          cat > twa-app/app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#e50914</color>
              <color name="backgroundColor">#050505</color>
          </resources>
          XML

          # Styles
          cat > twa-app/app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@color/backgroundColor</item>
              </style>
          </resources>
          XML

          # File paths
          cat > twa-app/app/src/main/res/xml/filepaths.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <files-path name="files" path="." />
          </paths>
          XML

          # Strings
          cat > twa-app/app/src/main/res/values/strings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Vaultflix</string>
          </resources>
          XML

      - name: Download App Icon
        run: |
          mkdir -p twa-app/app/src/main/res/mipmap-hdpi
          mkdir -p twa-app/app/src/main/res/mipmap-mdpi
          mkdir -p twa-app/app/src/main/res/mipmap-xhdpi
          mkdir -p twa-app/app/src/main/res/mipmap-xxhdpi
          mkdir -p twa-app/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa-app/app/src/main/res/drawable

          # Download icon
          curl -L "https://vaultflix.netlify.app/icon-192.png" -o icon.png 2>/dev/null || \
            convert -size 192x192 xc:#e50914 -fill white -draw "text 50,110 'VF'" icon.png

          # Copy to all densities
          cp icon.png twa-app/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon.png twa-app/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icon.png twa-app/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icon.png twa-app/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icon.png twa-app/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # Splash drawable (simple color)
          cat > twa-app/app/src/main/res/drawable/splash.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <solid android:color="#050505"/>
          </shape>
          XML

      - name: Build Release APK
        run: |
          cd twa-app
          chmod +x gradlew 2>/dev/null || gradle wrapper
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Find and Copy APK
        run: |
          echo "=== Finding APK ==="
          find twa-app -name "*.apk"
          APK=$(find twa-app -name "*.apk" | head -1)
          cp "$APK" vaultflix-release.apk
          ls -lh vaultflix-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vaultflix-APK
          path: vaultflix-release.apk
          retention-days: 30

      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: Vaultflix-Keystore-SAVE-THIS
          path: vaultflix.keystore
          retention-days: 30
