name: Build Vaultflix TWA APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate Signing Key
        run: |
          keytool -genkeypair \
            -alias vaultflix \
            -keyalg RSA \
            -keysize 2048 \
            -validity 9125 \
            -keystore vaultflix.keystore \
            -storepass vaultflix123 \
            -keypass vaultflix123 \
            -dname "CN=Vaultflix, OU=App, O=Vaultflix, L=IN, ST=IN, C=IN" \
            -noprompt

      - name: Initialize TWA Project
        run: |
          bubblewrap init --manifest https://vaultflix.netlify.app/manifest.json \
            --packageId app.vaultflix.twa \
            --name "Vaultflix" \
            --launcherName "Vaultflix" \
            --display standalone \
            --orientation any \
            --themeColor "#e50914" \
            --backgroundColor "#050505" \
            --startUrl "https://vaultflix.netlify.app/" \
            --iconUrl "https://vaultflix.netlify.app/icon-512.png" \
            --maskableIconUrl "https://vaultflix.netlify.app/icon-maskable-512.png" \
            --signingKeyPath ./vaultflix.keystore \
            --signingKeyAlias vaultflix \
            --signingKeyStorePassword vaultflix123 \
            --signingKeyPassword vaultflix123 \
            --minSdkVersion 21 \
            --targetSdkVersion 34

      - name: Build APK
        run: |
          bubblewrap build \
            --signingKeyPath ./vaultflix.keystore \
            --signingKeyAlias vaultflix \
            --signingKeyStorePassword vaultflix123 \
            --signingKeyPassword vaultflix123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vaultflix-APK
          path: app-release-signed.apk
          retention-days: 30

      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: Vaultflix-Keystore-SAVE-THIS
          path: vaultflix.keystore
          retention-days: 30
