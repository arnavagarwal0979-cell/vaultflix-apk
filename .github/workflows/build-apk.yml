name: Build Vaultflix TWA APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate Signing Key
        run: |
          keytool -genkeypair \
            -alias vaultflix \
            -keyalg RSA \
            -keysize 2048 \
            -validity 9125 \
            -keystore vaultflix.keystore \
            -storepass vaultflix123 \
            -keypass vaultflix123 \
            -dname "CN=Vaultflix, OU=App, O=Vaultflix, L=IN, ST=IN, C=IN" \
            -noprompt

      - name: Configure Bubblewrap (skip JDK prompt)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << 'CONFIG'
          {
            "jdkPath": "/opt/hostedtoolcache/Java_Temurin_jdk/17.0.14-7/x64",
            "androidSdkPath": "/usr/local/lib/android/sdk"
          }
          CONFIG

      - name: Create TWA Manifest
        run: |
          cat > twa-manifest.json << 'MANIFEST'
          {
            "packageId": "app.vaultflix.twa",
            "host": "vaultflix.netlify.app",
            "name": "Vaultflix",
            "launcherName": "Vaultflix",
            "display": "standalone",
            "orientation": "any",
            "themeColor": "#e50914",
            "navigationColor": "#050505",
            "navigationColorDark": "#050505",
            "navigationDividerColor": "#050505",
            "navigationDividerColorDark": "#050505",
            "backgroundColor": "#050505",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://vaultflix.netlify.app/icon-512.png",
            "maskableIconUrl": "https://vaultflix.netlify.app/icon-maskable-512.png",
            "monochromeIconUrl": "https://vaultflix.netlify.app/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "../vaultflix.keystore",
              "alias": "vaultflix"
            },
            "appVersionCode": 1,
            "appVersionName": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://vaultflix.netlify.app/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": { "enabled": false },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://vaultflix.netlify.app/",
            "minSdkVersion": 21,
            "targetSdkVersion": 34,
            "shareTarget": null,
            "additionalTrustedOrigins": [],
            "retainedBundles": []
          }
          MANIFEST

      - name: Build APK
        run: |
          echo "n" | bubblewrap build --skipPwaValidation
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Find and prepare APK
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" 2>/dev/null
          APK=$(find . -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" vaultflix-release.apk
            echo "APK found: $APK"
          else
            echo "No APK found!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vaultflix-APK
          path: vaultflix-release.apk
          retention-days: 30

      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: Vaultflix-Keystore-SAVE-THIS
          path: vaultflix.keystore
          retention-days: 30
