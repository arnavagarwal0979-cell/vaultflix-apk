name: Build Vaultflix TWA APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Generate Keystore
        run: |
          keytool -genkeypair -alias vaultflix -keyalg RSA -keysize 2048 -validity 9125 -keystore vaultflix.keystore -storepass vaultflix123 -keypass vaultflix123 -dname "CN=Vaultflix,O=Vaultflix,C=IN" -noprompt

      - name: Create project with Python
        run: |
          python3 << 'PYEOF'
          import os

          def mkdirs(path):
              os.makedirs(path, exist_ok=True)

          def write(path, content):
              with open(path, 'w') as f:
                  f.write(content)

          mkdirs('app/app/src/main/res/values')
          mkdirs('app/app/src/main/res/xml')
          mkdirs('app/app/src/main/res/drawable')
          mkdirs('app/app/src/main/res/mipmap-xxhdpi')
          mkdirs('app/app/src/main/java/app/vaultflix/twa')
          mkdirs('app/gradle/wrapper')

          write('app/settings.gradle', "include ':app'\n")

          write('app/build.gradle', """
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          """)

          write('app/gradle.properties', """
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          """)

          write('app/gradle/wrapper/gradle-wrapper.properties', """
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          """)

          write('app/app/build.gradle', """
          plugins { id 'com.android.application' }
          android {
              compileSdk 34
              namespace 'app.vaultflix.twa'
              defaultConfig {
                  applicationId 'app.vaultflix.twa'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0.0'
              }
              signingConfigs {
                  release {
                      storeFile file('../../vaultflix.keystore')
                      storePassword 'vaultflix123'
                      keyAlias 'vaultflix'
                      keyPassword 'vaultflix123'
                  }
              }
              buildTypes {
                  release { minifyEnabled false; signingConfig signingConfigs.release }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          """)

          write('app/app/src/main/AndroidManifest.xml', """<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application android:label="Vaultflix" android:icon="@mipmap/ic_launcher" android:theme="@style/AppTheme" android:allowBackup="true">
              <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity" android:label="Vaultflix" android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL" android:value="https://vaultflix.netlify.app/"/>
                <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR" android:resource="@color/colorPrimary"/>
                <meta-data android:name="android.support.customtabs.trusted.SPLASH_IMAGE_DRAWABLE" android:resource="@drawable/splash"/>
                <meta-data android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR" android:resource="@color/backgroundColor"/>
                <meta-data android:name="android.support.customtabs.trusted.FILE_PROVIDER_AUTHORITY" android:value="app.vaultflix.twa.fileprovider"/>
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW"/>
                  <category android:name="android.intent.category.DEFAULT"/>
                  <category android:name="android.intent.category.BROWSABLE"/>
                  <data android:scheme="https" android:host="vaultflix.netlify.app"/>
                </intent-filter>
              </activity>
              <provider android:name="androidx.core.content.FileProvider" android:authorities="app.vaultflix.twa.fileprovider" android:exported="false" android:grantUriPermissions="true">
                <meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml/filepaths"/>
              </provider>
            </application>
          </manifest>""")

          write('app/app/src/main/res/values/colors.xml', """<?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#e50914</color>
            <color name="backgroundColor">#050505</color>
          </resources>""")

          write('app/app/src/main/res/values/styles.xml', """<?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="android:Theme.Black.NoTitleBar">
              <item name="android:windowBackground">@color/backgroundColor</item>
              <item name="android:windowFullscreen">true</item>
            </style>
          </resources>""")

          write('app/app/src/main/res/values/strings.xml', """<?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">Vaultflix</string></resources>""")

          write('app/app/src/main/res/xml/filepaths.xml', """<?xml version="1.0" encoding="utf-8"?>
          <paths><files-path name="files" path="."/></paths>""")

          write('app/app/src/main/res/drawable/splash.xml', """<?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
            <solid android:color="#050505"/>
          </shape>""")

          print("All files created!")
          PYEOF

      - name: Download icon
        run: |
          curl -L "https://vaultflix.netlify.app/icon-192.png" -o icon.png
          cp icon.png app/app/src/main/res/mipmap-xxhdpi/ic_launcher.png

      - name: Setup Gradle wrapper
        run: |
          cd app
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Build APK
        run: |
          cd app
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vaultflix-APK
          path: app/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: Vaultflix-Keystore-SAVE-THIS
          path: vaultflix.keystore
          retention-days: 30
